<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>비주얼 레퍼런스 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5fa;
      --surface:   #ffffff;
      --border:    #e8e8f0;
      --accent:    #5f4df0;
      --accent-lt: #ede9ff;
      --text:      #1a1a2e;
      --text-mute: #8585a0;
      --danger:    #e53e5e;
      --radius:    14px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── 시계 ───────────────────────────────────── */
    #clock {
      position: fixed; top: 14px; left: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--text-mute);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 20px;
      box-shadow: var(--shadow-sm);
      z-index: 30;
    }

    /* ── 닉네임 배지 ─────────────────────────────── */
    #user-badge {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      font-size: 12px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      padding: 6px 16px; border-radius: 20px;
      box-shadow: var(--shadow-sm);
      z-index: 30;
      cursor: default;
    }

    /* ── 사이드바 토글 버튼 ──────────────────────── */
    #sidebar-toggle {
      position: fixed; top: 14px; right: 16px;
      font-size: 11px; font-weight: 700;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 20px;
      box-shadow: var(--shadow-sm);
      cursor: pointer; z-index: 30;
      transition: all 0.2s;
    }
    #sidebar-toggle:hover { background: var(--accent-lt); color: var(--accent); }

    /* ── 레이아웃 ────────────────────────────────── */
    #layout {
      display: flex;
      padding-top: 56px;
      transition: padding-right 0.3s;
    }
    #layout.sidebar-open { padding-right: 300px; }

    /* ── 메인 콘텐츠 ─────────────────────────────── */
    #main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 24px 48px;
      min-width: 0;
    }

    /* ── 검색 영역 ────────────────────────────────── */
    .search-wrap {
      width: 100%; max-width: 540px;
      margin-bottom: 40px;
    }
    .search-mode-toggle {
      display: flex;
      background: var(--border);
      border-radius: 20px;
      padding: 3px;
      width: 220px;
      margin: 0 auto 12px;
      position: relative;
    }
    .toggle-glider {
      position: absolute; top: 3px; bottom: 3px; left: 3px;
      width: calc(50% - 3px);
      background: var(--surface);
      border-radius: 17px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .toggle-glider.right { transform: translateX(calc(100% + 0px)); }
    .toggle-btn {
      flex: 1; z-index: 1;
      text-align: center; font-size: 11px; font-weight: 700;
      padding: 5px 0; cursor: pointer;
      color: var(--text-mute); transition: color 0.2s;
      user-select: none;
    }
    .toggle-btn.active { color: var(--accent); }

    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; color: var(--text);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95,77,240,0.12);
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 15px; pointer-events: none;
    }
    .suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      max-height: 240px; overflow-y: auto;
      z-index: 50; display: none;
    }
    .suggestion-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--bg); }
    .suggestion-item img { width: 40px; height: 28px; object-fit: cover; border-radius: 4px; background: var(--bg); flex-shrink: 0; }
    .suggestion-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggestion-url   { font-size: 10px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── 북마크 섹션 헤더 ───────────────────────── */
    .section-header {
      width: 100%; max-width: 920px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .count-badge {
      font-size: 11px; font-weight: 500; color: var(--text-mute);
    }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .sort-select {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px; cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .sort-select:focus { border-color: var(--accent); }
    .btn-add {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 14px; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(95,77,240,0.25);
    }
    .btn-add:hover { background: #4c3dd4; box-shadow: 0 4px 14px rgba(95,77,240,0.35); }

    /* ── 빈 상태 ─────────────────────────────────── */
    #empty-view {
      width: 100%; max-width: 920px;
      flex: 1;
      border: 2px dashed var(--border);
      border-radius: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px;
      background: var(--surface);
    }
    #empty-view p { font-size: 12px; color: var(--text-mute); text-align: center; line-height: 1.8; }
    #empty-view .empty-icon { font-size: 36px; margin-bottom: 14px; }

    /* ── 북마크 그리드 ───────────────────────────── */
    #grid {
      width: 100%; max-width: 920px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
      display: none;
    }

    /* ── 카드 ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      position: relative;
      display: flex; flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
    .card-thumb {
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .card:hover .card-thumb img { transform: scale(1.04); }
    .card-body { padding: 14px 14px 12px; flex: 1; display: flex; flex-direction: column; }
    .card-title {
      font-size: 12px; font-weight: 700; line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      word-break: break-all;
      margin-bottom: 6px;
      transition: color 0.2s;
    }
    .card:hover .card-title { color: var(--accent); }
    .card-date {
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-mute);
      margin-bottom: 4px;
    }
    .card-url {
      font-size: 10px; color: var(--text-mute);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-del {
      position: absolute; top: 8px; right: 8px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.5);
      border: none; border-radius: 50%;
      color: #fff; font-size: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.2s;
    }
    .card:hover .card-del { opacity: 1; }
    .card-del:hover { background: var(--danger); }

    /* ── 사이드바 ────────────────────────────────── */
    #sidebar {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 20px rgba(0,0,0,0.06);
      padding: 68px 20px 24px;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 20;
      display: flex; flex-direction: column; gap: 0;
      overflow: hidden;
    }
    #sidebar.open { transform: translateX(0); }
    .sidebar-section-title {
      font-size: 9px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-mute);
      margin-bottom: 10px;
    }
    .quick-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 20px;
    }
    .quick-item {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; text-decoration: none;
      transition: all 0.2s;
    }
    .quick-item:hover { background: var(--accent-lt); border-color: var(--accent); }
    .quick-item img { width: 18px; height: 18px; margin-bottom: 5px; object-fit: contain; }
    .quick-item span { font-size: 10px; font-weight: 600; color: var(--text); text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    hr.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 16px; }
    #sidebar-list { overflow-y: auto; flex: 1; }
    .sidebar-link {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 6px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 11px; font-weight: 600; color: var(--text);
      transition: background 0.15s;
      overflow: hidden;
    }
    .sidebar-link:hover { background: var(--bg); }
    .sidebar-link img { width: 16px; height: 12px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: var(--bg); }
    .sidebar-link span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── 모달 ───────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      z-index: 60;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      display: none;
    }
    .modal-box {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow-md);
      animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      display: block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--text-mute); margin-bottom: 6px;
    }
    .modal-field input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; color: var(--text);
      background: var(--bg);
      outline: none; transition: border-color 0.2s;
    }
    .modal-field input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .btn-cancel {
      padding: 9px 16px; border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; font-weight: 700;
      background: transparent; color: var(--text-mute);
      border: 1px solid var(--border); cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-submit {
      padding: 9px 20px; border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; cursor: pointer;
      box-shadow: 0 2px 8px rgba(95,77,240,0.3);
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-submit:hover:not(:disabled) { background: #4c3dd4; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── 스피너 ─────────────────────────────────── */
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 토스트 알림 ─────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      box-shadow: var(--shadow-md);
      z-index: 100; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .browser-bridge {
      position: fixed;
      top: 58px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, calc(100% - 24px));
      background: #111827;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      padding: 12px;
      z-index: 120;
      display: none;
      gap: 10px;
      align-items: center;
    }
    .browser-bridge.show { display: flex; }
    .browser-bridge p {
      flex: 1;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.86);
    }
    .browser-bridge-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .browser-bridge button {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .browser-bridge .primary {
      background: #fff;
      color: #111827;
    }

    @media (hover: none) {
      .card:hover { transform: none; box-shadow: var(--shadow-sm); }
      .card:hover .card-thumb img { transform: none; }
      .card-del { opacity: 1; width: 30px; height: 30px; font-size: 12px; }
    }

    @media (max-width: 768px) {
      :root { --radius: 12px; }
      body { min-height: 100dvh; }
      #clock { display: none; }
      #user-badge {
        top: max(10px, env(safe-area-inset-top));
        left: 12px;
        right: 154px;
        transform: none;
        max-width: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 7px 12px;
      }
      #sidebar-toggle {
        top: max(10px, env(safe-area-inset-top));
        right: 12px;
        padding: 7px 11px;
        z-index: 90;
      }
      #layout,
      #layout.sidebar-open {
        display: block;
        padding-top: calc(54px + env(safe-area-inset-top));
        padding-right: 0;
      }
      body.has-browser-bridge #layout,
      body.has-browser-bridge #layout.sidebar-open {
        padding-top: calc(142px + env(safe-area-inset-top));
      }
      #main {
        padding: 18px 14px calc(36px + env(safe-area-inset-bottom));
        align-items: stretch;
      }
      .search-wrap {
        max-width: none;
        margin-bottom: 24px;
      }
      .search-mode-toggle {
        width: 100%;
        max-width: 340px;
        margin-bottom: 10px;
      }
      .toggle-btn {
        min-height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .search-box input {
        font-size: 16px;
        padding: 15px 16px 15px 44px;
      }
      .suggestions {
        max-height: min(320px, 48dvh);
      }
      .suggestion-item {
        min-height: 56px;
        padding: 11px 12px;
      }
      .section-header {
        max-width: none;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }
      .section-title {
        min-height: 36px;
        align-items: center;
      }
      .header-actions {
        width: 100%;
        justify-content: stretch;
      }
      .sort-select,
      .btn-add {
        min-height: 38px;
        font-size: 12px;
      }
      .sort-select { flex: 1; min-width: 0; }
      .btn-add { flex-shrink: 0; padding: 8px 12px; }
      #empty-view {
        max-width: none;
        min-height: 42dvh;
        padding: 36px 18px;
        border-radius: 14px;
      }
      #grid {
        max-width: none;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .card-body { padding: 13px 13px 12px; }
      .card-title { font-size: 13px; }
      .card-url { font-size: 11px; }
      #sidebar {
        width: min(88vw, 340px);
        padding: calc(62px + env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
        z-index: 80;
      }
      .quick-item {
        min-height: 68px;
      }
      #modal-overlay {
        align-items: flex-end;
        padding: 12px;
      }
      .modal-box {
        max-height: calc(100dvh - 24px - env(safe-area-inset-top));
        overflow-y: auto;
        border-radius: 16px;
        padding: 22px 18px 18px;
      }
      .modal-field input {
        font-size: 16px;
        padding: 12px;
      }
      .modal-actions {
        justify-content: stretch;
      }
      .btn-cancel,
      .btn-submit {
        flex: 1;
        min-height: 42px;
        justify-content: center;
      }
      #toast {
        bottom: calc(14px + env(safe-area-inset-bottom));
        width: calc(100% - 24px);
        text-align: center;
        border-radius: 12px;
      }
      .browser-bridge {
        top: calc(52px + env(safe-area-inset-top));
        align-items: stretch;
        flex-direction: column;
      }
      .browser-bridge-actions button {
        flex: 1;
        min-height: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="browser-bridge" id="browser-bridge">
    <p>카카오톡 안에서 열렸습니다. 로그인이나 새 창 이동이 불안정하면 Chrome에서 열어주세요.</p>
    <div class="browser-bridge-actions">
      <button type="button" class="primary" onclick="openCurrentPageInChrome()">Chrome 열기</button>
      <button type="button" onclick="copyCurrentUrl()">주소 복사</button>
      <button type="button" onclick="hideBrowserBridge()">닫기</button>
    </div>
  </div>

  <!-- 시계 -->
  <div id="clock">🕒 로딩 중...</div>

  <!-- 닉네임 배지 -->
  <div id="user-badge">...</div>

  <!-- 사이드바 토글 -->
  <button id="sidebar-toggle" onclick="toggleSidebar()">📌 북마크 열기</button>

  <!-- 레이아웃 -->
  <div id="layout">
    <!-- 메인 -->
    <main id="main">

      <!-- 검색 -->
      <div class="search-wrap">
        <div class="search-mode-toggle" id="mode-toggle" onclick="toggleSearchMode()">
          <div class="toggle-glider" id="glider"></div>
          <span class="toggle-btn active" id="btn-google">Google 검색</span>
          <span class="toggle-btn" id="btn-bm">북마크 검색</span>
        </div>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Google 검색어 입력..."
            autocomplete="off" />
          <div class="suggestions" id="suggestions"></div>
        </div>
      </div>

      <!-- 섹션 헤더 -->
      <div class="section-header">
        <div class="section-title">
          📂 북마크 모음
          <span class="count-badge" id="count">(0)</span>
        </div>
        <div class="header-actions">
          <select class="sort-select" id="sort-select" onchange="applySortAndRender()">
            <option value="latest">최신순</option>
            <option value="oldest">오래된순</option>
          </select>
          <button class="btn-add" onclick="openModal()">+ 북마크 추가</button>
        </div>
      </div>

      <!-- 빈 상태 -->
      <div id="empty-view">
        <div class="empty-icon">📭</div>
        <p>아직 저장된 북마크가 없습니다.<br>오른쪽 상단의 <strong>+ 북마크 추가</strong>를 눌러 첫 번째 레퍼런스를 저장해보세요.</p>
      </div>

      <!-- 그리드 -->
      <div id="grid"></div>

    </main>

    <!-- 사이드바 -->
    <aside id="sidebar">
      <p class="sidebar-section-title">⚡ 빠른 링크</p>
      <div class="quick-grid">
        <a class="quick-item" href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">
          <img src="https://www.youtube.com/favicon.ico" alt="" onerror="this.src='https://via.placeholder.com/18'">
          <span>유튜브</span>
        </a>
        <a class="quick-item" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
          <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=32" alt="" onerror="this.src='https://via.placeholder.com/18'">
          <span>인스타그램</span>
        </a>
        <a class="quick-item" href="https://www.google.com" target="_blank" rel="noopener noreferrer">
          <img src="https://www.google.com/favicon.ico" alt="" onerror="this.src='https://via.placeholder.com/18'">
          <span>구글</span>
        </a>
        <a class="quick-item" href="https://www.reddit.com" target="_blank" rel="noopener noreferrer">
          <img src="https://www.reddit.com/favicon.ico" alt="" onerror="this.src='https://via.placeholder.com/18'">
          <span>레딧</span>
        </a>
      </div>
      <hr class="sidebar-divider">
      <p class="sidebar-section-title">📑 전체 북마크</p>
      <div id="sidebar-list"></div>
    </aside>
  </div>

  <!-- 북마크 추가 모달 -->
  <div id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-box">
      <p class="modal-title">📎 새 북마크 추가</p>
      <div class="modal-field">
        <label>사이트 주소 (URL) *</label>
        <input type="text" id="modal-url" placeholder="https://example.com 또는 유튜브 링크" />
      </div>
      <div class="modal-field">
        <label>제목 (선택 — 비워두면 자동 크롤링)</label>
        <input type="text" id="modal-name" placeholder="지정하지 않으면 서버가 자동 분석합니다" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-submit" id="btn-submit" onclick="submitBookmark()">추가하기</button>
      </div>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div id="toast"></div>

  <script>
    /* ══════════════════════════════════════════════
       설정
    ══════════════════════════════════════════════ */
    const BACKEND_HOST = window.location.origin;
    const LOGIN_PAGE   = '/login';

    /* ══════════════════════════════════════════════
       상태
    ══════════════════════════════════════════════ */
    let bookmarks     = [];
    let isBmSearch    = false;
    let isSidebarOpen = false;

    /* ══════════════════════════════════════════════
       초기화
    ══════════════════════════════════════════════ */
    (async function init() {
      // 세션 쿠키 검증
      try {
        const res = await fetch(`${BACKEND_HOST}/api/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin'
        });
        if (!res.ok) throw new Error('invalid');

        const { nickname } = await res.json();
        document.getElementById('user-badge').textContent = `👤 ${nickname}`;

        // 닉네임 alert (요구사항)
        setTimeout(() => alert(`환영합니다, ${nickname}님! 👋`), 300);

        startClock();
        await fetchBookmarks();
      } catch {
        redirect(LOGIN_PAGE);
      }
    })();

    function redirect(page) {
      window.location.href = page;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    /* ══════════════════════════════════════════════
       실시간 시계
    ══════════════════════════════════════════════ */
    function startClock() {
      const tick = () => {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        document.getElementById('clock').textContent =
          `🕒 ${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} `
          + `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      };
      tick();
      setInterval(tick, 60_000);
    }

    /* ══════════════════════════════════════════════
       사이드바
    ══════════════════════════════════════════════ */
    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      document.getElementById('sidebar').classList.toggle('open', isSidebarOpen);
      document.getElementById('layout').classList.toggle('sidebar-open', isSidebarOpen);
      document.getElementById('sidebar-toggle').textContent = isSidebarOpen ? '📌 북마크 닫기' : '📌 북마크 열기';
    }

    /* ══════════════════════════════════════════════
       검색 모드 토글
    ══════════════════════════════════════════════ */
    function toggleSearchMode() {
      isBmSearch = !isBmSearch;
      document.getElementById('glider').classList.toggle('right', isBmSearch);
      document.getElementById('btn-google').classList.toggle('active', !isBmSearch);
      document.getElementById('btn-bm').classList.toggle('active', isBmSearch);
      const input = document.getElementById('search-input');
      input.placeholder = isBmSearch ? '저장한 북마크 검색...' : 'Google 검색어 입력...';
      input.value = '';
      hideSuggestions();
    }

    /* ── 검색 입력 이벤트 ───────────────────────── */
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const q = e.target.value.trim();
      if (!q) return;

      if (!isBmSearch) {
        openGoogleSearch(q);
      } else {
        const match = filterBookmarks(q)[0];
        if (match) { openExternalUrl(match.url); hideSuggestions(); }
      }
    });

    document.getElementById('search-input').addEventListener('input', e => {
      if (!isBmSearch) return;
      const q = e.target.value.trim();
      const matched = filterBookmarks(q);
      if (!q || matched.length === 0) { hideSuggestions(); return; }
      renderSuggestions(matched);
    });

    document.addEventListener('click', e => {
      if (!document.getElementById('search-input').contains(e.target) &&
          !document.getElementById('suggestions').contains(e.target)) {
        hideSuggestions();
      }
    });

    function filterBookmarks(q) {
      if (!q) return [];
      const lq = q.toLowerCase();
      return bookmarks.filter(b =>
        b.title.toLowerCase().includes(lq) || b.url.toLowerCase().includes(lq)
      );
    }

    function renderSuggestions(items) {
      const box = document.getElementById('suggestions');
      box.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.innerHTML = `
          <img src="${escapeHtml(item.thumbnailUrl)}" alt=""
               onerror="this.src='https://via.placeholder.com/40x28?text=img'">
          <div style="min-width:0">
            <div class="suggestion-title">${escapeHtml(item.title)}</div>
            <div class="suggestion-url">${escapeHtml(item.url)}</div>
          </div>`;
        div.addEventListener('click', () => {
          openExternalUrl(item.url);
          hideSuggestions();
          document.getElementById('search-input').value = '';
        });
        box.appendChild(div);
      });
      box.style.display = 'block';
    }

    function hideSuggestions() {
      document.getElementById('suggestions').style.display = 'none';
    }

    function isMobileViewport() {
      return window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
    }

    function isKakaoInAppBrowser() {
      return /KAKAOTALK/i.test(navigator.userAgent || '');
    }

    function openExternalUrl(url) {
      if (isMobileViewport()) {
        window.location.href = url;
        return;
      }
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function openGoogleSearch(query) {
      const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      const input = document.getElementById('search-input');

      if (isMobileViewport()) {
        input.blur();
        toast('Google 검색으로 이동합니다.');
        window.location.assign(url);
        return;
      }

      window.open(url, '_blank', 'noopener,noreferrer');
      input.value = ''; // PC에서는 Google 검색 후 검색바에 있는 값 비우기
    }

    function showBrowserBridgeIfNeeded() {
      if (!isKakaoInAppBrowser()) return;
      document.body.classList.add('has-browser-bridge');
      document.getElementById('browser-bridge').classList.add('show');
    }

    function hideBrowserBridge() {
      document.body.classList.remove('has-browser-bridge');
      document.getElementById('browser-bridge').classList.remove('show');
    }

    function openCurrentPageInChrome() {
      const current = getShareableCurrentUrl();
      const withoutScheme = current.replace(/^https?:\/\//i, '');
      const scheme = window.location.protocol.replace(':', '') || 'https';

      if (/Android/i.test(navigator.userAgent || '')) {
        window.location.href = `intent://${withoutScheme}#Intent;scheme=${scheme};package=com.android.chrome;end`;
        return;
      }

      copyCurrentUrl();
      toast('주소를 복사했습니다. Chrome에서 붙여넣어 열어주세요.');
    }

    async function copyCurrentUrl() {
      try {
        await navigator.clipboard.writeText(getShareableCurrentUrl());
        toast('주소를 복사했습니다.');
      } catch {
        toast('주소 복사가 제한되었습니다. 주소창의 링크를 복사해주세요.');
      }
    }

    function getShareableCurrentUrl() {
      return `${window.location.origin}${window.location.pathname}${window.location.search}`;
    }

    function applyMobileLinkBehavior() {
      if (!isMobileViewport()) return;
      document.querySelectorAll('a[target="_blank"]').forEach(link => {
        link.addEventListener('click', event => {
          const href = link.getAttribute('href');
          if (!href || !/^https?:\/\//i.test(href)) return;
          event.preventDefault();
          window.location.href = href;
        });
      });
    }

    /* ══════════════════════════════════════════════
       API: 북마크 가져오기
    ══════════════════════════════════════════════ */
    async function fetchBookmarks() {
      try {
        const res = await fetch(`${BACKEND_HOST}/api/bookmarks`, {
          credentials: 'same-origin'
        });
        if (res.status === 401) { redirect(LOGIN_PAGE); return; }
        if (!res.ok) throw new Error('fetch error');

        bookmarks = await res.json();
        applySortAndRender();
      } catch (err) {
        console.error('[fetchBookmarks]', err);
        toast('북마크를 불러오는 데 실패했습니다.');
      }
    }

    /* ══════════════════════════════════════════════
       정렬 & 렌더링
    ══════════════════════════════════════════════ */
    function getTimestamp(b) {
      if (!b.date || !b.time) return 0;
      return new Date(
        b.date.year, b.date.month - 1, b.date.day,
        b.time.hour, b.time.minute, b.time.second
      ).getTime();
    }

    function applySortAndRender() {
      const mode = document.getElementById('sort-select').value;
      bookmarks.sort((a, b) =>
        mode === 'latest'
          ? getTimestamp(b) - getTimestamp(a)
          : getTimestamp(a) - getTimestamp(b)
      );
      renderUI();
    }

    function renderUI() {
      document.getElementById('count').textContent = `(${bookmarks.length})`;

      const grid  = document.getElementById('grid');
      const empty = document.getElementById('empty-view');

      if (bookmarks.length === 0) {
        empty.style.display = 'flex';
        grid.style.display  = 'none';
      } else {
        empty.style.display = 'none';
        grid.style.display  = 'grid';
        grid.innerHTML = '';
        bookmarks.forEach(renderCard);
      }

      renderSidebarList();
    }

    function renderCard(item) {
      const grid = document.getElementById('grid');
      const pad  = n => String(n).padStart(2, '0');
      let dateStr = '';
      if (item.date && item.time) {
        dateStr = `${item.date.year}.${pad(item.date.month)}.${pad(item.date.day)} `
                + `${pad(item.time.hour)}:${pad(item.time.minute)}`;
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${escapeHtml(item.thumbnailUrl)}" alt=""
               loading="lazy"
               onerror="this.src='https://via.placeholder.com/300x180?text=No+Thumbnail'">
        </div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(item.title)}</div>
          ${dateStr ? `<div class="card-date">${dateStr}</div>` : ''}
          <div class="card-url">${escapeHtml(item.url)}</div>
        </div>
        <button class="card-del" title="삭제" onclick="deleteBookmark('${escapeHtml(item.id)}', event)">✕</button>`;
      card.addEventListener('click', () => openExternalUrl(item.url));
      grid.appendChild(card);
    }

    function renderSidebarList() {
      const list = document.getElementById('sidebar-list');
      list.innerHTML = '';
      if (bookmarks.length === 0) {
        list.innerHTML = `<p style="font-size:10px;color:var(--text-mute);text-align:center;padding:12px">목록이 비어있습니다.</p>`;
        return;
      }
      bookmarks.forEach(item => {
        const a = document.createElement('a');
        a.className = 'sidebar-link';
        a.href = item.url;
        if (!isMobileViewport()) {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
        a.innerHTML = `
          <img src="${escapeHtml(item.thumbnailUrl)}" alt=""
               onerror="this.src='https://via.placeholder.com/16'">
          <span>${escapeHtml(item.title)}</span>`;
        list.appendChild(a);
      });
    }

    /* ══════════════════════════════════════════════
       API: 북마크 추가
    ══════════════════════════════════════════════ */
    function openModal() {
      document.getElementById('modal-overlay').style.display = 'flex';
      document.getElementById('modal-url').focus();
    }
    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      document.getElementById('modal-url').value  = '';
      document.getElementById('modal-name').value = '';
    }
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    async function submitBookmark() {
      const url  = document.getElementById('modal-url').value.trim();
      const name = document.getElementById('modal-name').value.trim();
      if (!url) { alert('URL을 입력해주세요.'); return; }

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> 분석 중...';

      try {
        const res = await fetch(`${BACKEND_HOST}/api/bookmarks`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'same-origin',
          body: JSON.stringify({ url, customName: name })
        });
        if (res.status === 401) { redirect(LOGIN_PAGE); return; }
        if (!res.ok) throw new Error('submit error');

        await fetchBookmarks();
        closeModal();
        toast('북마크가 추가되었습니다! 🎉');
      } catch (err) {
        console.error(err);
        toast('추가에 실패했습니다. 서버를 확인해주세요.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '추가하기';
      }
    }

    /* ══════════════════════════════════════════════
       API: 북마크 삭제
    ══════════════════════════════════════════════ */
    async function deleteBookmark(id, event) {
      event.stopPropagation();
      if (!confirm('이 북마크를 삭제하시겠습니까?')) return;

      try {
        const res = await fetch(`${BACKEND_HOST}/api/bookmarks/${id}`, {
          method: 'DELETE',
          credentials: 'same-origin'
        });
        if (!res.ok) throw new Error('delete error');

        await fetchBookmarks();
        toast('삭제되었습니다.');
      } catch (err) {
        console.error(err);
        toast('삭제에 실패했습니다.');
      }
    }


    /* ══════════════════════════════════════════════
       토스트 알림
    ══════════════════════════════════════════════ */
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    showBrowserBridgeIfNeeded();
    applyMobileLinkBehavior();
  </script>
</body>
</html>
